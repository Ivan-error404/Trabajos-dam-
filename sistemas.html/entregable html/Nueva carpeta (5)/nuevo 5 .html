<!DOCTYPE html>
<html lang="es">
	<head>
	  <meta charset="UTF-8">
	  <title>Formulario ejer 5 </title>
	</head>
<body>
  <p>Selecciona tu medio de transporte favorito</p>
  
	  <form action="#" method="post">

		<input type="radio" id="coche" name="transporte" value="coche" checked>
		<label for="coche">Coche</label><br>

		<input type="radio" id="bicicleta" name="transporte" value="bicicleta">
		<label for="bicicleta">Bicicleta</label><br>

		<input type="radio" id="autobus" name="transporte" value="autobus">
		<label for="autobus">Autobús</label><br>

		<input type="radio" id="apie" name="transporte" value="apie">
		<label for="apie">A pie</label><br><br>

	  
		<input type="submit" value="Enviar">
		<input type="reset" value="Borrar">
	  </form>
	  
</body>
</html>
