<body>

<h1>Poema</h1>

<h2>Con diez cañones por banda,<br>

viento en popa a toda vela,<br>

no corta el mar, sino vuela
</h2>

<h3>Un velero bergantín:<br>

bajel pirata que llaman,<br>

por su bravura, el Temido
</h3>
